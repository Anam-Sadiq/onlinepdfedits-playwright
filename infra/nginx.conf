# infra/nginx.conf
#
# Hardening fix for security finding:
#   "Server header exposes version: nginx/1.24.0 (Ubuntu)"
#
# nginx leaks its exact version in the `Server` response header, which lets
# attackers fingerprint the box and target known CVEs for that exact build.
# `server_tokens off;` strips the version so the header just reads "nginx".
#
# HOW TO APPLY
#   1. Merge the `server_tokens off;` line into the `http { }` block of your
#      real nginx config (or drop this file into /etc/nginx/conf.d/).
#   2. Test:  sudo nginx -t
#   3. Reload: sudo nginx -s reload
#
# After this, re-run the Playwright test
#   "response should not expose server version in headers"
# and it should pass (Server: nginx — no version).

http {
    # Strip the version from the Server header (security hardening).
    server_tokens off;

    # …your existing http-level directives (client_max_body_size,
    # gzip, ssl, proxy settings, etc.) go here…

    server {
        listen 80;
        server_name onlinepdfedits.com www.onlinepdfedits.com;

        # If you run a WAF / rate-limiter in front of nginx, also allowlist
        # your CI runner's IP so Playwright jobs are not throttled to 429.
        # Example (replace with your CI IP / CIDR):
        #   limit_req_zone $binary_remote_addr zone=ci:10m rate=100r/s;
        #   limit_req zone=ci burst=200 nodelay;   # only for the CI IP

        location / {
            proxy_pass http://localhost:3000;   # Next.js app
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
